<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffeed6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>MEOW DREAMS</title>
<style>
  /* Bundled comic font (SIL OFL) - phones don't ship Comic Sans, and
     Android's generic-cursive fallback is a flowy script that wrecks the
     look. cat-theme.js nudges document.fonts.load() so the canvas gets it
     immediately. build-public.mjs rewrites these paths for the live site. */
  @font-face {
    font-family: "Comic Neue"; font-style: normal; font-weight: 400; font-display: swap;
    src: url("comic-neue-400.woff2") format("woff2");
  }
  @font-face {
    font-family: "Comic Neue"; font-style: normal; font-weight: 700; font-display: swap;
    src: url("comic-neue-700.woff2") format("woff2");
  }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #ffeed6;
    background-image: radial-gradient(rgba(255,183,201,0.35) 3px, transparent 3px);
    background-size: 34px 34px;
    overflow: auto;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  body {
    padding: 12px; box-sizing: border-box; touch-action: none;
    padding-left: max(12px, env(safe-area-inset-left));
    padding-right: max(12px, env(safe-area-inset-right));
    padding-top: max(12px, env(safe-area-inset-top));
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  /* Phones: drop the 12px cushion (keep only the notch/home-bar safe areas)
     so the playfield uses the full width; matches the pad in boot.js fit(). */
  @media (hover: none) and (pointer: coarse) {
    body {
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
  }
  canvas#game {
    image-rendering: auto;
    box-shadow: 0 10px 40px rgba(74,54,48,0.25);
    border: 3px solid #4a3630;
    border-radius: 14px;
    touch-action: none;
  }
  #nv-bomb-btn {
    position: fixed; right: 18px; bottom: 22px; z-index: 70;
    width: 66px; height: 66px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-size: 30px;
    background: radial-gradient(circle at 50% 40%, #ffe3a1, #ffcf6b);
    border: 3px solid #4a3630;
    box-shadow: 0 4px 14px rgba(74,54,48,0.3);
    touch-action: none; -webkit-tap-highlight-color: transparent;
  }
  @media (hover: none) and (pointer: coarse) { #nv-bomb-btn { display: flex; } }
  #nv-rotate {
    position: fixed; inset: 0; z-index: 90; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: #ffeed6; color: #4a3630;
    font-family: "Comic Neue","Comic Sans MS","Comic Sans",cursive; text-align: center; padding: 20px;
  }
  @media (hover: none) and (pointer: coarse) and (orientation: landscape) { #nv-rotate { display: flex; } }
  #preview-banner {
    position: fixed; top: 3px; left: 50%; transform: translateX(-50%); z-index: 95;
    font-family: "Comic Neue","Comic Sans MS","Comic Sans",cursive; font-size: 10px; font-weight: 700; letter-spacing: .06em;
    white-space: nowrap;
    color: #fff6e8; background: #ff8fb3; padding: 2px 12px; border-radius: 12px;
    border: 2px solid #4a3630; box-shadow: 0 3px 10px rgba(74,54,48,0.25);
    cursor: pointer; touch-action: manipulation;
  }
  /* field guide — sidebar on wide screens, pop-over everywhere else */
  #cat-codex {
    position: fixed; right: 14px; top: 50%; transform: translateY(-50%); z-index: 95;
    width: 235px; max-height: 94vh; overflow-y: auto;
    font-family: "Comic Neue","Comic Sans MS","Comic Sans",cursive; font-size: 11px; line-height: 1.3; color: #4a3630;
    background: rgba(255,246,232,0.96); border: 2px solid #4a3630;
    border-radius: 14px; padding: 10px 12px 12px;
  }
  #cat-codex .cx-title { font-weight: 700; font-size: 13px; letter-spacing: .08em; text-align: center; margin-bottom: 2px; }
  #cat-codex .cx-head { font-weight: 700; color: #d9931f; letter-spacing: .1em; font-size: 10.5px; margin: 9px 0 2px; border-bottom: 1.5px dashed rgba(74,54,48,0.25); padding-bottom: 2px; }
  #cat-codex .cx-row { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
  #cat-codex .cx-row canvas { flex: 0 0 auto; border: 2px solid #4a3630; border-radius: 10px; background: #fffdf8; }
  #cat-codex .cx-txt b { color: #ff5f96; }
  #cat-codex .cx-note { color: #b08c6a; font-size: 10px; margin: 1px 0 4px 2px; }
  @media (hover: none) and (pointer: coarse) { #cat-codex { display: none; } }
  @media (max-width: 1000px) { #cat-codex { display: none; } }
  #codex-dim { display: none; position: fixed; inset: 0; z-index: 110; background: rgba(74,54,48,0.4); }
  #cat-codex .cx-close { display: none; text-align: center; color: #b08c6a; font-size: 10px; margin-top: 8px; }
  body.codex-open #cat-codex .cx-close { display: block; }
  body.codex-open #codex-dim { display: block; }
  body.codex-open #cat-codex {
    display: block; z-index: 120;
    left: 50%; right: auto; transform: translate(-50%, -50%);
    width: min(330px, 86vw); max-height: 86vh;
    box-shadow: 0 14px 50px rgba(74,54,48,0.45);
  }
</style>
</head>
<body>
<canvas id="game" width="480" height="720"></canvas>
<div id="nv-bomb-btn" aria-label="bell"><svg width="36" height="37" viewBox="-9 -8.5 18 18.5" aria-hidden="true"><path d="M -6 -0.5 A 6 6 0 0 1 6 -0.5 L 7 3.6 L -7 3.6 Z" fill="#ffcf6b" stroke="#4a3630" stroke-width="1.6" stroke-linejoin="round"/><rect x="-6.5" y="3.6" width="13" height="1.6" fill="#4a3630"/><circle cx="0" cy="7.4" r="1.8" fill="#4a3630"/><circle cx="-2.2" cy="-2.4" r="1.4" fill="rgba(255,255,255,0.8)"/></svg></div>
<div id="nv-rotate"><div class="ic">↻</div><div class="t1">ROTATE YOUR DEVICE</div><div class="t2">MEOW DREAMS plays in portrait</div></div>
<div id="preview-banner">📖 FIELD GUIDE (tap or C)</div>
<script src="meow.js?v=72"></script>
</body>
</html>
