<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#030109">
<meta name="description" content="NEON VOID - a fast neon vertical shooter. Play in your browser on desktop or mobile.">
<!-- Add-to-home-screen: launch fullscreen + app-like on iOS and Android -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEON VOID">
<title>NEON VOID - A vertical shooter</title>
<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #030109;
    overflow: auto;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  /* The playfield is a fixed 480x720, so tall phone screens letterbox it.
     Dress the letterbox as more of the void: the gradient stops are CSS
     variables that Render.draw() keeps in sync with the CURRENT stage's sky
     palette, so the bars always match the game instead of clashing when the
     stage colours change. Defaults below = the stage-1 palette. */
  body {
    background: linear-gradient(var(--nv-top, #060312), var(--nv-mid, #0a0620) 55%, var(--nv-bot, #120a2e));
  }
  /* Letterbox stars: two layers drifting slowly downward like the in-game
     starfield (motion is what reads as "stars" instead of dust). Each star
     is listed twice, 100vh apart, so the 0 -> 100vh drift loops seamlessly.
     Positions in vw/vh (generated once); the canvas covers the middle ones. */
  body::before, body::after {
    content: ""; position: fixed; left: 0; top: 0; width: 1px; height: 1px;
    background: transparent; border-radius: 50%; pointer-events: none;
  }
  body::before { /* far layer: small, slow */
    animation: nv-drift 96s linear infinite;
    box-shadow: 41.9vw 96.3vh 0 1px rgba(255,255,255,0.55),41.9vw calc(96.3vh - 100vh) 0 1px rgba(255,255,255,0.55),70.6vw 83.6vh 0 1px rgba(255,255,255,0.55),70.6vw calc(83.6vh - 100vh) 0 1px rgba(255,255,255,0.55),10.1vw 64.9vh 0 1px rgba(214,236,255,0.6),10.1vw calc(64.9vh - 100vh) 0 1px rgba(214,236,255,0.6),15.1vw 80.6vh 0 0.7px rgba(214,236,255,0.6),15.1vw calc(80.6vh - 100vh) 0 0.7px rgba(214,236,255,0.6),1.8vw 44.1vh 0 1px rgba(255,255,255,0.55),1.8vw calc(44.1vh - 100vh) 0 1px rgba(255,255,255,0.55),52.4vw 11.5vh 0 1px rgba(255,255,255,0.55),52.4vw calc(11.5vh - 100vh) 0 1px rgba(255,255,255,0.55),53.2vw 40.3vh 0 0.7px rgba(255,255,255,0.55),53.2vw calc(40.3vh - 100vh) 0 0.7px rgba(255,255,255,0.55),57.2vw 12.8vh 0 1px rgba(255,255,255,0.55),57.2vw calc(12.8vh - 100vh) 0 1px rgba(255,255,255,0.55),0.4vw 86.4vh 0 0.7px rgba(214,236,255,0.6),0.4vw calc(86.4vh - 100vh) 0 0.7px rgba(214,236,255,0.6),32.9vw 48.3vh 0 0.7px rgba(214,236,255,0.6),32.9vw calc(48.3vh - 100vh) 0 0.7px rgba(214,236,255,0.6),42.5vw 75.3vh 0 1px rgba(255,255,255,0.55),42.5vw calc(75.3vh - 100vh) 0 1px rgba(255,255,255,0.55),45.2vw 62.7vh 0 0.7px rgba(255,255,255,0.55),45.2vw calc(62.7vh - 100vh) 0 0.7px rgba(255,255,255,0.55),70.1vw 21.9vh 0 1px rgba(214,236,255,0.6),70.1vw calc(21.9vh - 100vh) 0 1px rgba(214,236,255,0.6);
  }
  body::after { /* near layer: bigger, brighter, glowing halo, faster */
    animation: nv-drift 52s linear infinite;
    box-shadow: 57.6vw 12.4vh 1px 1.2px rgba(255,184,228,0.6),57.6vw calc(12.4vh - 100vh) 1px 1.2px rgba(255,184,228,0.6),67.4vw 43.9vh 1px 1.2px rgba(255,255,255,0.85),67.4vw calc(43.9vh - 100vh) 1px 1.2px rgba(255,255,255,0.85),77.2vw 68.4vh 2px 1.4px rgba(255,255,255,0.85),77.2vw calc(68.4vh - 100vh) 2px 1.4px rgba(255,255,255,0.85),61.5vw 2.7vh 1px 1.2px rgba(255,184,228,0.6),61.5vw calc(2.7vh - 100vh) 1px 1.2px rgba(255,184,228,0.6),84.8vw 82.1vh 3px 1.6px rgba(255,255,255,0.85),84.8vw calc(82.1vh - 100vh) 3px 1.6px rgba(255,255,255,0.85),38.8vw 96.4vh 2px 1.4px rgba(154,223,255,0.8),38.8vw calc(96.4vh - 100vh) 2px 1.4px rgba(154,223,255,0.8),64.2vw 89.4vh 2px 1.4px rgba(154,223,255,0.8),64.2vw calc(89.4vh - 100vh) 2px 1.4px rgba(154,223,255,0.8),51.2vw 23.5vh 1px 1.2px rgba(255,255,255,0.85),51.2vw calc(23.5vh - 100vh) 1px 1.2px rgba(255,255,255,0.85),4.9vw 76.9vh 3px 1.6px rgba(255,184,228,0.6),4.9vw calc(76.9vh - 100vh) 3px 1.6px rgba(255,184,228,0.6);
  }
  @keyframes nv-drift { from { transform: translateY(0); } to { transform: translateY(100vh); } }
  /* Respect notches / home indicators (iOS safe areas) so the canvas is never
     clipped; falls back to a plain 12px on browsers without env() support. */
  body {
    box-sizing: border-box; touch-action: none;
    padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
  }
  /* Phones: drop the 12px cushion (keep only the notch/home-bar safe areas)
     so the playfield uses the full width; matches the pad in boot.js fit(). */
  @media (hover: none) and (pointer: coarse) {
    body {
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    #game { border-radius: 0; } /* id outweighs the later plain `canvas` rule */
  }
  canvas {
    image-rendering: auto;
    box-shadow: 0 0 60px rgba(77, 243, 255, 0.12), 0 0 120px rgba(255, 77, 240, 0.08);
    border-radius: 4px;
    touch-action: none;
  }
  /* On-screen bomb button (touch devices only) - bottom-right; movement is
     full-width direct steering on the canvas itself, no joystick. */
  #nv-bomb-btn {
    position: fixed; z-index: 70;
    right: calc(18px + env(safe-area-inset-right)); bottom: calc(22px + env(safe-area-inset-bottom));
    width: 66px; height: 66px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-family: monospace; font-size: 30px; color: #ffdf9a;
    background: radial-gradient(circle at 50% 40%, rgba(255,184,77,0.28), rgba(255,140,60,0.12));
    border: 2px solid rgba(255,184,77,0.7);
    box-shadow: 0 0 22px rgba(255,184,77,0.35), inset 0 0 18px rgba(255,184,77,0.15);
    touch-action: none; -webkit-tap-highlight-color: transparent;
  }
  #nv-bomb-btn:active { background: radial-gradient(circle at 50% 40%, rgba(255,184,77,0.5), rgba(255,140,60,0.2)); }
  @media (hover: none) and (pointer: coarse) { #nv-bomb-btn { display: flex; } }
  /* Rotate-to-portrait hint (touch + landscape only). */
  #nv-rotate {
    position: fixed; inset: 0; z-index: 90; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: #05030d; color: #cfe9ff; font-family: monospace; text-align: center; padding: 20px;
  }
  #nv-rotate .ic { font-size: 60px; color: #4df3ff; text-shadow: 0 0 20px rgba(77,243,255,0.6); animation: nv-rot 2.2s ease-in-out infinite; }
  #nv-rotate .t1 { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: #eaffff; }
  #nv-rotate .t2 { font-size: 11px; letter-spacing: 0.12em; color: #8fb2cf; }
  @keyframes nv-rot { 0%,45%{transform:rotate(0)} 70%,100%{transform:rotate(-90deg)} }
  @media (hover: none) and (pointer: coarse) and (orientation: landscape) { #nv-rotate { display: flex; } }
</style>
</head>
<body>
<canvas id="game" width="480" height="720"></canvas>
<div id="nv-bomb-btn" aria-label="bomb">✸</div>
<div id="nv-rotate"><div class="ic">↻</div><div class="t1">ROTATE YOUR DEVICE</div><div class="t2">NEON VOID plays in portrait</div></div>
<!-- ?v bumped on each deploy so browsers never serve a stale build.
     Dev loads the src/ files in order (shared scope - data first, boot last);
     build-public.mjs collapses them into ONE minified game.js for the live site. -->
<script src="game.js?v=75"></script>
<script src="leaderboard.js?v=75"></script>
</body>
</html>
