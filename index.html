<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#030109">
<title>NEON VOID — vertical shooter</title>
<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #030109;
    overflow: auto;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  body { padding: 12px; box-sizing: border-box; touch-action: none; }
  canvas {
    image-rendering: auto;
    box-shadow: 0 0 60px rgba(77, 243, 255, 0.12), 0 0 120px rgba(255, 77, 240, 0.08);
    border-radius: 4px;
    touch-action: none;
  }
  /* On-screen bomb button (touch devices only) — bottom-LEFT; the joystick
     owns the bottom-right corner. */
  #nv-bomb-btn {
    position: fixed; left: 18px; bottom: 22px; z-index: 70;
    width: 66px; height: 66px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-family: monospace; font-size: 30px; color: #ffdf9a;
    background: radial-gradient(circle at 50% 40%, rgba(255,184,77,0.28), rgba(255,140,60,0.12));
    border: 2px solid rgba(255,184,77,0.7);
    box-shadow: 0 0 22px rgba(255,184,77,0.35), inset 0 0 18px rgba(255,184,77,0.15);
    touch-action: none; -webkit-tap-highlight-color: transparent;
  }
  #nv-bomb-btn:active { background: radial-gradient(circle at 50% 40%, rgba(255,184,77,0.5), rgba(255,140,60,0.2)); }
  /* Corner joystick (touch devices only): thumb rests here instead of on the ship. */
  #nv-stick {
    position: fixed; right: 14px; bottom: 16px; z-index: 70;
    width: 124px; height: 124px; border-radius: 50%;
    display: none;
    background: radial-gradient(circle, rgba(77,243,255,0.08), rgba(77,243,255,0.02) 70%);
    border: 2px solid rgba(77,243,255,0.35);
    box-shadow: 0 0 18px rgba(77,243,255,0.15), inset 0 0 24px rgba(77,243,255,0.06);
    touch-action: none; -webkit-tap-highlight-color: transparent;
  }
  #nv-stick .knob {
    position: absolute; left: 50%; top: 50%; margin: -24px 0 0 -24px;
    width: 48px; height: 48px; border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, rgba(77,243,255,0.45), rgba(77,243,255,0.12));
    border: 2px solid rgba(77,243,255,0.8);
    box-shadow: 0 0 16px rgba(77,243,255,0.4);
    pointer-events: none;
  }
  @media (hover: none) and (pointer: coarse) { #nv-bomb-btn { display: flex; } #nv-stick { display: block; } }
  /* Rotate-to-portrait hint (touch + landscape only). */
  #nv-rotate {
    position: fixed; inset: 0; z-index: 90; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: #05030d; color: #cfe9ff; font-family: monospace; text-align: center; padding: 20px;
  }
  #nv-rotate .ic { font-size: 60px; color: #4df3ff; text-shadow: 0 0 20px rgba(77,243,255,0.6); animation: nv-rot 2.2s ease-in-out infinite; }
  #nv-rotate .t1 { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: #eaffff; }
  #nv-rotate .t2 { font-size: 11px; letter-spacing: 0.12em; color: #8fb2cf; }
  @keyframes nv-rot { 0%,45%{transform:rotate(0)} 70%,100%{transform:rotate(-90deg)} }
  @media (hover: none) and (pointer: coarse) and (orientation: landscape) { #nv-rotate { display: flex; } }
</style>
</head>
<body>
<canvas id="game" width="480" height="720"></canvas>
<div id="nv-bomb-btn" aria-label="bomb">✸</div>
<div id="nv-stick" aria-label="joystick"><div class="knob"></div></div>
<div id="nv-rotate"><div class="ic">↻</div><div class="t1">ROTATE YOUR DEVICE</div><div class="t2">NEON VOID plays in portrait</div></div>
<!-- ?v bumped on each deploy so browsers never serve a stale build -->
<script src="game.js?v=55"></script>
<script src="leaderboard.js?v=55"></script>
</body>
</html>
