<meta name="description" content="NEON VOID - a fast neon vertical shooter. Play in your browser on desktop or mobile.">

<title>NEON VOID - A vertical shooter</title>
<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #030109;
    overflow: auto;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  /* The playfield is a fixed 480x720, so tall phone screens letterbox it.
     Dress the letterbox as more of the void - same gradient family as the
     in-game stage-1 sky plus faint nebulae - so the bars read as scenery,
     not dead space. */
  body {
    background:
      radial-gradient(ellipse 62vw 38vh at 18% 10%, rgba(80,40,160,0.20), transparent 70%),
      radial-gradient(ellipse 70vw 42vh at 84% 90%, rgba(200,60,140,0.14), transparent 70%),
      linear-gradient(#060312, #0a0620 55%, #120a2e);
  }
  /* Star specks for the letterbox (positions generated once, in vw/vh so any
     screen size gets the same sky; the game canvas covers the middle ones). */
  body::before, body::after {
    content: ""; position: fixed; left: 0; top: 0; width: 1px; height: 1px;
    border-radius: 50%; pointer-events: none;
  }
  body::before {
    background: rgba(255,255,255,0.38);
    animation: nv-twinkle 3.4s ease-in-out infinite alternate;
    box-shadow: 27.7vw 72.6vh 0 0 rgba(255,255,255,0.38),69.8vw 94.1vh 0 0 rgba(255,255,255,0.38),41.3vw 72.0vh 0 0 rgba(255,255,255,0.38),37.7vw 41.4vh 0 0 rgba(255,255,255,0.38),57.7vw 66.1vh 0 0 rgba(255,255,255,0.38),46.7vw 1.4vh 0 0 rgba(255,255,255,0.38),62.6vw 10.0vh 0 0 rgba(255,255,255,0.38),23.7vw 9.1vh 0 0 rgba(255,255,255,0.38),4.6vw 31.9vh 0 0 rgba(255,255,255,0.38),8.4vw 81.7vh 0 0 rgba(255,255,255,0.38),72.8vw 59.7vh 0 0 rgba(255,255,255,0.38),29.9vw 26.9vh 0 0 rgba(255,255,255,0.38),44.1vw 12.6vh 0 0 rgba(255,255,255,0.38),38.1vw 85.4vh 0 0 rgba(255,255,255,0.38),99.6vw 75.3vh 0 0 rgba(255,255,255,0.38),92.7vw 78.7vh 0 0 rgba(255,255,255,0.38),89.8vw 35.3vh 0 0 rgba(255,255,255,0.38),58.0vw 89.0vh 0 0 rgba(255,255,255,0.38),45.1vw 4.8vh 0 0 rgba(255,255,255,0.38),26.8vw 86.1vh 0 0 rgba(255,255,255,0.38),8.8vw 24.4vh 0 0 rgba(255,255,255,0.38),43.6vw 62.9vh 0 0 rgba(255,255,255,0.38),45.6vw 79.0vh 0 0 rgba(255,255,255,0.38),66.6vw 49.9vh 0 0 rgba(255,255,255,0.38),44.0vw 62.8vh 0 0 rgba(255,255,255,0.38),57.5vw 68.2vh 0 0 rgba(255,255,255,0.38),12.4vw 50.2vh 0 0 rgba(255,255,255,0.38),80.3vw 95.3vh 0 0 rgba(255,255,255,0.38),52.2vw 95.0vh 0 0 rgba(255,255,255,0.38),23.8vw 1.1vh 0 0 rgba(255,255,255,0.38),78.0vw 62.2vh 0 0 rgba(255,255,255,0.38),24.9vw 70.1vh 0 0 rgba(255,255,255,0.38),63.5vw 91.4vh 0 0 rgba(255,255,255,0.38),0.3vw 49.7vh 0 0 rgba(255,255,255,0.38),74.2vw 46.7vh 0 0 rgba(255,255,255,0.38),89.6vw 23.6vh 0 0 rgba(255,255,255,0.38),95.1vw 92.1vh 0 0 rgba(255,255,255,0.38),16.5vw 45.2vh 0 0 rgba(255,255,255,0.38),71.4vw 86.5vh 0 0 rgba(255,255,255,0.38),20.8vw 84.6vh 0 0 rgba(255,255,255,0.38),25.5vw 47.9vh 0 0 rgba(255,255,255,0.38),95.3vw 4.0vh 0 0 rgba(255,255,255,0.38),68.7vw 89.6vh 0 0 rgba(255,255,255,0.38),39.1vw 22.9vh 0 0 rgba(255,255,255,0.38),90.2vw 15.2vh 0 0 rgba(255,255,255,0.38),90.4vw 14.6vh 0 0 rgba(255,255,255,0.38),16.5vw 38.4vh 0 0 rgba(255,255,255,0.38),69.9vw 9.0vh 0 0 rgba(255,255,255,0.38),16.7vw 25.9vh 0 0 rgba(255,255,255,0.38),58.9vw 90.8vh 0 0 rgba(255,255,255,0.38),21.9vw 46.3vh 0 0 rgba(255,255,255,0.38),87.1vw 70.7vh 0 0 rgba(255,255,255,0.38),15.2vw 95.0vh 0 0 rgba(255,255,255,0.38),41.4vw 67.5vh 0 0 rgba(255,255,255,0.38),70.6vw 56.1vh 0 0 rgba(255,255,255,0.38),56.7vw 25.1vh 0 0 rgba(255,255,255,0.38);
  }
  body::after {
    background: rgba(214,243,255,0.55);
    box-shadow: 24.8vw 48.0vh 0 0.5px rgba(214,243,255,0.55),84.8vw 10.3vh 0 0.5px rgba(214,243,255,0.55),85.9vw 27.0vh 0 0.5px rgba(214,243,255,0.55),94.8vw 25.7vh 0 0.5px rgba(214,243,255,0.55),25.0vw 55.4vh 0 0.5px rgba(214,243,255,0.55),97.1vw 94.9vh 0 0.5px rgba(214,243,255,0.55),72.9vw 37.9vh 0 0.5px rgba(214,243,255,0.55),55.1vw 65.0vh 0 0.5px rgba(214,243,255,0.55),50.0vw 49.9vh 0 0.5px rgba(214,243,255,0.55),63.7vw 43.7vh 0 0.5px rgba(214,243,255,0.55),55.8vw 24.8vh 0 0.5px rgba(214,243,255,0.55),67.4vw 99.6vh 0 0.5px rgba(214,243,255,0.55),31.5vw 65.7vh 0 0.5px rgba(214,243,255,0.55),81.1vw 1.2vh 0 0.5px rgba(214,243,255,0.55),29.5vw 96.9vh 0 0.5px rgba(214,243,255,0.55),93.3vw 72.6vh 0 0.5px rgba(214,243,255,0.55),89.7vw 65.6vh 0 0.5px rgba(214,243,255,0.55),41.7vw 34.5vh 0 0.5px rgba(214,243,255,0.55),93.7vw 38.2vh 0 0.5px rgba(214,243,255,0.55),40.0vw 14.9vh 0 0.5px rgba(214,243,255,0.55),97.7vw 6.2vh 0 0.5px rgba(214,243,255,0.55),53.5vw 13.9vh 0 0.5px rgba(214,243,255,0.55),53.6vw 33.6vh 0 1px rgba(77,243,255,0.5),3.2vw 95.1vh 0 1px rgba(77,243,255,0.5),46.3vw 36.8vh 0 1px rgba(77,243,255,0.5),37.4vw 87.5vh 0 1px rgba(77,243,255,0.5),83.7vw 20.9vh 0 1px rgba(77,243,255,0.5),92.5vw 94.4vh 0 1px rgba(77,243,255,0.5),29.0vw 17.6vh 0 1px rgba(77,243,255,0.5);
  }
  @keyframes nv-twinkle { from { opacity: 0.5; } to { opacity: 1; } }
  /* Respect notches / home indicators (iOS safe areas) so the canvas is never
     clipped; falls back to a plain 12px on browsers without env() support. */
  body {
    box-sizing: border-box; touch-action: none;
    padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
  }
  /* Phones: drop the 12px cushion (keep only the notch/home-bar safe areas)
     so the playfield uses the full width; matches the pad in boot.js fit(). */
  @media (hover: none) and (pointer: coarse) {
    body {
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    #game { border-radius: 0; } /* id outweighs the later plain `canvas` rule */
  }
  canvas {
    image-rendering: auto;
    box-shadow: 0 0 60px rgba(77, 243, 255, 0.12), 0 0 120px rgba(255, 77, 240, 0.08);
    border-radius: 4px;
    touch-action: none;
  }
  /* On-screen bomb button (touch devices only) - bottom-right; movement is
     full-width direct steering on the canvas itself, no joystick. */
  #nv-bomb-btn {
    position: fixed; z-index: 70;
    right: calc(18px + env(safe-area-inset-right)); bottom: calc(22px + env(safe-area-inset-bottom));
    width: 66px; height: 66px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-family: monospace; font-size: 30px; color: #ffdf9a;
    background: radial-gradient(circle at 50% 40%, rgba(255,184,77,0.28), rgba(255,140,60,0.12));
    border: 2px solid rgba(255,184,77,0.7);
    box-shadow: 0 0 22px rgba(255,184,77,0.35), inset 0 0 18px rgba(255,184,77,0.15);
    touch-action: none; -webkit-tap-highlight-color: transparent;
  }
  #nv-bomb-btn:active { background: radial-gradient(circle at 50% 40%, rgba(255,184,77,0.5), rgba(255,140,60,0.2)); }
  @media (hover: none) and (pointer: coarse) { #nv-bomb-btn { display: flex; } }
  /* Rotate-to-portrait hint (touch + landscape only). */
  #nv-rotate {
    position: fixed; inset: 0; z-index: 90; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: #05030d; color: #cfe9ff; font-family: monospace; text-align: center; padding: 20px;
  }
  #nv-rotate .ic { font-size: 60px; color: #4df3ff; text-shadow: 0 0 20px rgba(77,243,255,0.6); animation: nv-rot 2.2s ease-in-out infinite; }
  #nv-rotate .t1 { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: #eaffff; }
  #nv-rotate .t2 { font-size: 11px; letter-spacing: 0.12em; color: #8fb2cf; }
  @keyframes nv-rot { 0%,45%{transform:rotate(0)} 70%,100%{transform:rotate(-90deg)} }
  @media (hover: none) and (pointer: coarse) and (orientation: landscape) { #nv-rotate { display: flex; } }

</head>
<body>
<canvas id="game" width="480" height="720"></canvas>
<div id="nv-bomb-btn" aria-label="bomb">✸</div>
<div id="nv-rotate"><div class="ic">↻</div><div class="t1">ROTATE YOUR DEVICE</div><div class="t2">NEON VOID plays in portrait</div></div>
<!-- ?v bumped on each deploy so browsers never serve a stale build.
     Dev loads the src/ files in order (shared scope - data first, boot last);
     build-public.mjs collapses them into ONE minified game.js for the live site. -->
<script src="game.js?v=73"></script>
<script src="leaderboard.js?v=73"></script>
</body>
</html>
